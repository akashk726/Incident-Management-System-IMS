version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: ims_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: ims
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: ims_redis
    ports:
      - "6379:6379"

  mongo:
    image: mongo:6
    container_name: ims_mongo
    ports:
      - "27017:27017"